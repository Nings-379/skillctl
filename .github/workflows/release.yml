name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build all platforms
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/skillctl-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o dist/skillctl-linux-arm64 .
          GOOS=windows GOARCH=amd64 go build -o dist/skillctl-windows-amd64.exe .
          GOOS=darwin GOARCH=amd64 go build -o dist/skillctl-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/skillctl-darwin-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
